<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <button class="icon-button"><i class="fas fa-bars"></i></button>
      <button class="new-chat-btn" (click)="nuevoChat()">
        <i class="fas fa-plus"></i>
        <span>Nuevo Chat</span>
      </button>
    </div>

    <div class="chat-history-list">
      <div class="history-item" *ngFor="let chat of chatsGuardados">
        <i class="far fa-comment-alt"></i>
        <span>{{ chat.titulo }}</span>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-nav">
      <h1>Tutor Inteligente</h1>
      <button class="theme-btn" (click)="toggleDarkMode()">
        <i class="fas fa-moon"></i>
      </button>
    </header>

    <div class="chat-window">
      </div>

    <footer class="input-section">
      <div class="neon-input-bar">
        <label for="fileInput" class="icon-button" title="Adjuntar imágenes">
          <i class="fas fa-plus"></i>
          <input type="file" id="fileInput" (change)="onFileSelected($event)" multiple hidden>
        </label>
        
        <textarea 
          [(ngModel)]="nuevoMensaje" 
          placeholder="Pregunta algo..." 
          rows="1">
        </textarea>
        
        <button (click)="enviarMensaje()" class="icon-button send-btn">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </footer>
  </main>
</div>
